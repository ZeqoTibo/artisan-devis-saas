services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: artisan_devis_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
    environment:
      APP_ENV: dev
      # À aligner avec .env Symfony une fois le projet créé
      DATABASE_URL: mysql://symfony:symfony@database:3306/app?serverVersion=8.0&charset=utf8mb4
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: artisan_devis_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  database:
    image: mysql:8.4
    container_name: artisan_devis_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    # Hôte 3307 si 3306 est déjà pris (MySQL local, autre stack). Les autres services utilisent toujours database:3306.
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailer:
    image: axllent/mailpit:latest
    container_name: artisan_devis_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    profiles:
      - tools

volumes:
  mysql_data:
